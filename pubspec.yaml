name: notesapp
description: "A Chat-based note taking app!"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  # ================= SORTED DEPENDENCIES ================= #
  # UI
  chat_bubbles: ^1.7.0
  cupertino_icons: ^1.0.8
  iconify_flutter: ^0.0.7
  svg_flutter: ^0.0.1

  # State management
  flutter_riverpod: ^3.0.3

  # Date / time / formatting
  intl: ^0.20.2

  # Media handling
  file_picker: ^10.3.3
  image_cropper: ^11.0.0
  image_picker: ^1.1.2
  mime: ^2.0.0

  # Storage / persistence
  isar_community: ^3.3.0-dev.3
  isar_community_flutter_libs: ^3.3.0-dev.3
  path_provider: ^2.1.5

  # Utilities
  contextmenu: ^3.0.0
  pull_to_refresh_flutter3: ^2.0.2
  share_plus: ^12.0.0
  uuid: ^4.5.1
  pasteboard: ^0.4.0
  scrollable_positioned_list: ^0.3.8
  emoji_picker_flutter: ^4.3.0
  extended_image: ^10.0.1
  typeset: ^2.3.0
  url_launcher: ^6.3.2
  camera: ^0.11.2
  record: ^6.1.2

  # Voice / Audio
  flutter_cache_manager: ^3.3.1
  just_audio: ^0.10.5
  syncfusion_flutter_sliders: ^31.1.19
  just_waveform: ^0.0.7
  open_file: ^3.5.10
  siri_wave: ^2.3.0
  receive_sharing_intent: ^1.8.1
  flutter_native_splash: ^2.4.7
  flutter_launcher_icons: ^0.14.4
  croppy: ^1.4.1
  blurhash_dart: ^1.2.1
  image: ^4.5.4

  # Video
  video_player: ^2.10.0
  video_thumbnail: ^0.5.6
  ffmpeg_kit_flutter_new: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_lint: ^3.0.3
  isar_community_generator: ^3.3.0-dev.3
  build_runner: ^2.4.13
  analyzer: ^7.6.0
  photox: ^0.2.1
  photo_view: ^0.15.0

dependency_overrides:
  http: ^1.2.0
  uuid: ^4.5.1
  intl: ^0.20.2
  record_android:
    path: plugins/record_android

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/icons/
    - assets/launcher/
    - assets/backgrounds/
    - assets/fonts/poppins/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/poppins/Poppins-Thin.ttf
          weight: 100
        - asset: assets/fonts/poppins/Poppins-ThinItalic.ttf
          weight: 100
          style: italic
        - asset: assets/fonts/poppins/Poppins-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/poppins/Poppins-ExtraLightItalic.ttf
          weight: 200
          style: italic
        - asset: assets/fonts/poppins/Poppins-Light.ttf
          weight: 300
        - asset: assets/fonts/poppins/Poppins-LightItalic.ttf
          weight: 300
          style: italic
        - asset: assets/fonts/poppins/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/poppins/Poppins-Italic.ttf
          weight: 400
          style: italic
        - asset: assets/fonts/poppins/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/poppins/Poppins-MediumItalic.ttf
          weight: 500
          style: italic
        - asset: assets/fonts/poppins/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/poppins/Poppins-SemiBoldItalic.ttf
          weight: 600
          style: italic
        - asset: assets/fonts/poppins/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/poppins/Poppins-BoldItalic.ttf
          weight: 700
          style: italic
        - asset: assets/fonts/poppins/Poppins-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/poppins/Poppins-ExtraBoldItalic.ttf
          weight: 800
          style: italic
        - asset: assets/fonts/poppins/Poppins-Black.ttf
          weight: 900
        - asset: assets/fonts/poppins/Poppins-BlackItalic.ttf
          weight: 900
          style: italic
